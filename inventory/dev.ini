# =============================================================================
# Ansible Inventory — Tailscale MagicDNS
# =============================================================================
# Используются MagicDNS-имена (требуется включённый MagicDNS в Tailscale).
# Если MagicDNS не включён — замените имена на Tailscale IP (100.x.x.x).
# =============================================================================

# --- DEV окружение -----------------------------------------------------------

[managers]
dev-manager-1

[workers]
dev-worker-1
# dev-worker-2

# --- Общие переменные --------------------------------------------------------

[all:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
